name: Supabase Keep-Alive

# Hält das Supabase-Projekt auf dem Gratis-Tarif "wach": Eine kleine Leseanfrage
# alle zwei Tage zählt als Aktivität und verhindert das automatische Pausieren
# (das nach ~7 Tagen Inaktivität passiert).
#
# Es wird ausschliesslich der öffentliche anon-Key verwendet (read-only, durch
# Row-Level-Security geschützt) – derselbe, der ohnehin in der App steckt.
on:
  schedule:
    - cron: '17 6 */2 * *' # alle 2 Tage, 06:17 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        env:
          SUPABASE_URL: https://dphhqwisluirihmahyee.supabase.co
          # Publishable Key (öffentlich, read-only via RLS) – Nachfolger des anon-Keys.
          SUPABASE_ANON_KEY: sb_publishable_-VhbMGsUIHDW_Z0U4v9iQw_qw0xiSTf
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/listings?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}")
          echo "Supabase responded with HTTP ${code}"
          if [ "${code}" -ge 200 ] && [ "${code}" -lt 400 ]; then
            echo "✅ Keep-alive successful"
          else
            echo "❌ Unexpected status ${code}"
            exit 1
          fi
