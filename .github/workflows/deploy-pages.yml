name: Deploy Web to GitHub Pages

# Baut bei jedem Push den Expo-Web-Export und veröffentlicht ihn auf GitHub Pages.
# Ergebnis: eine öffentliche URL, die du auf dem iPhone in Safari öffnen kannst.
on:
  push:
    branches:
      - main
      - claude/winti-guide-app-setup-dwTTv
  workflow_dispatch:

# Rechte, die actions/deploy-pages benötigt.
permissions:
  contents: read
  pages: write
  id-token: write

# Es soll immer nur ein Deployment gleichzeitig laufen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        env:
          # Project-Pages werden unter /<repo-name>/ ausgeliefert.
          EXPO_BASE_URL: /winti-guide-app
        run: npx expo export --platform web

      - name: SPA-Fallback (404 -> index)
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Aktiviert GitHub Pages automatisch beim ersten Lauf,
          # damit kein manuelles Umschalten in den Repo-Settings nötig ist.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
