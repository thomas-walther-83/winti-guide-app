name: Deploy Edge Functions (Supabase)

# Deployt alle Supabase Edge Functions in supabase/functions/* nach jedem
# Push auf main, wenn dort etwas geändert wurde. Auch manuell triggerbar.
#
# Benötigte GitHub-Secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  – Personal Access Token aus
#                            https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   – Projekt-Slug (steht in der Dashboard-URL),
#                            für dieses Projekt: dphhqwisluirihmahyee
#
# Function-spezifische Secrets (z.B. GROQ_API_KEY für ai-guide) werden NICHT
# hier gepflegt, sondern direkt im Supabase-Dashboard unter
# Project Settings → Edge Functions → Secrets. Die Function liest sie zur
# Laufzeit aus Deno.env.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF secret is not set"
            exit 1
          fi

      - name: Deploy ai-guide
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # --no-verify-jwt: Chat-Endpunkt ist auch für nicht eingeloggte
          # App-Nutzer erreichbar (anonymer Reiseführer-Chat).
          supabase functions deploy ai-guide \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --no-verify-jwt

      - name: Deploy stripe-webhook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Webhook MUSS verify-jwt = false haben, sonst weist Supabase
          # den Stripe-POST mit 401 ab. Authentizität wird über die
          # Stripe-Signatur in der Function geprüft.
          supabase functions deploy stripe-webhook \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" \
            --no-verify-jwt
