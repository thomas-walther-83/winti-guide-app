name: DB-Migration (Supabase)

# Wendet die SQL-Dateien aus supabase/migrations/ auf die Datenbank an.
# Alle Migrationen sind idempotent und können beliebig oft laufen.
#
# Voraussetzung: Repository-Secret SUPABASE_DB_PASSWORD = NUR das
# Datenbank-Passwort (kein kompletter Connection-String!).
# Host, Port, Benutzer und DB-Name sind unten fest hinterlegt – sie sind
# nicht geheim (die Projekt-ID steht ohnehin in der öffentlichen Supabase-URL).
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: db-migrate
  cancel-in-progress: false

env:
  PGHOST: aws-1-eu-central-2.pooler.supabase.com
  PGPORT: "5432"
  PGUSER: postgres.dphhqwisluirihmahyee
  PGDATABASE: postgres

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify password secret is set
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "❌ Repository-Secret SUPABASE_DB_PASSWORD fehlt."
            echo "   Anlegen unter Settings → Secrets and variables → Actions."
            echo "   Wert = NUR das Datenbank-Passwort (kein https://, kein postgresql://)."
            exit 1
          fi
          echo "✅ Passwort-Secret vorhanden. Verbinde mit:"
          echo "   Host: $PGHOST  Port: $PGPORT  User: $PGUSER  DB: $PGDATABASE"

      - name: Ensure psql is available
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          fi
          psql --version

      - name: Apply migrations
        env:
          # PGPASSWORD verträgt jedes Zeichen – keine URL-Kodierung nötig.
          # CR/LF entfernen wir defensiv, falls beim Einfügen ein Umbruch mitkam.
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -e
          shopt -s nullglob
          export PGPASSWORD=$(printf '%s' "$SUPABASE_DB_PASSWORD" | tr -d '\r\n')
          files=(supabase/migrations/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Keine Migrationsdateien gefunden."; exit 0
          fi
          for f in "${files[@]}"; do
            echo "▶ Wende an: $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "✅ Alle Migrationen angewendet."
