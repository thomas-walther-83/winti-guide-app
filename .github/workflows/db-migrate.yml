name: DB-Migration (Supabase)

# Wendet die SQL-Dateien aus supabase/migrations/ auf die Datenbank an.
# Alle Migrationen sind idempotent und können beliebig oft laufen.
#
# Passwort-Quelle (eine von beiden genügt):
#   - SUPABASE_DB_PASSWORD : nur das Datenbank-Passwort, ODER
#   - SUPABASE_DB_URL      : kompletter postgresql://...-String (Passwort wird extrahiert)
# Host/Port/User/DB sind fest hinterlegt (nicht geheim) und bestätigt korrekt.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: db-migrate
  cancel-in-progress: false

env:
  PGHOST: aws-1-eu-central-2.pooler.supabase.com
  PGPORT: "5432"
  PGUSER: postgres.dphhqwisluirihmahyee
  PGDATABASE: postgres

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure psql is available
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          fi
          psql --version

      - name: Apply migrations
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -e
          shopt -s nullglob

          # Passwort bestimmen: bevorzugt das reine Passwort-Secret,
          # sonst aus der vollständigen URL extrahieren.
          raw="$SUPABASE_DB_PASSWORD"
          if [ -z "$raw" ] && [ -n "$SUPABASE_DB_URL" ]; then
            url=$(printf '%s' "$SUPABASE_DB_URL" | tr -d '\r\n' | sed -E 's/[[:space:]]+//g')
            # alles zwischen dem ersten ':' nach dem User und dem letzten '@'
            raw=$(printf '%s' "$url" | sed -E 's#^[a-z]+://[^:]+:(.*)@[^@]*$#\1#')
          fi
          # versteckte Umbrüche/Leerzeichen entfernen
          export PGPASSWORD=$(printf '%s' "$raw" | tr -d '\r\n' | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')

          if [ -z "$PGPASSWORD" ]; then
            echo "❌ Kein Passwort gefunden. Setze entweder das Secret SUPABASE_DB_PASSWORD"
            echo "   (nur das Passwort) oder SUPABASE_DB_URL (kompletter Connection-String)."
            exit 1
          fi
          echo "✅ Passwort gefunden (Länge: ${#PGPASSWORD} Zeichen)."
          echo "   Verbinde mit Host=$PGHOST User=$PGUSER DB=$PGDATABASE Port=$PGPORT"

          files=(supabase/migrations/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Keine Migrationsdateien gefunden."; exit 0
          fi
          for f in "${files[@]}"; do
            echo "▶ Wende an: $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "✅ Alle Migrationen angewendet."
