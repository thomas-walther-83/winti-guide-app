name: DB-Migration (Supabase)

# Wendet die SQL-Dateien aus supabase/migrations/ auf die Datenbank an.
# Alle Migrationen sind idempotent (ADD COLUMN IF NOT EXISTS, CREATE TABLE
# IF NOT EXISTS, DROP/CREATE POLICY) und können beliebig oft laufen.
#
# Voraussetzung: Repository-Secret SUPABASE_DB_URL mit dem Postgres-
# Connection-String (Supabase → Settings → Database → Connection string).
# Empfehlung: den "Session pooler"-String verwenden – er ist IPv4-kompatibel,
# was GitHub-Runner benötigen.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify secret is set
        run: |
          if [ -z "${SUPABASE_DB_URL}" ]; then
            echo "❌ Repository-Secret SUPABASE_DB_URL fehlt."
            echo "   Anlegen unter Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "✅ Secret vorhanden."

      - name: Ensure psql is available
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          fi
          psql --version

      - name: Inspect connection target (password masked)
        run: |
          # Zeigt Benutzer/Host/Port/DB – das Passwort wird durch **** ersetzt.
          masked=$(printf '%s' "$SUPABASE_DB_URL" | sed -E 's#(://[^:]+:)[^@]*(@)#\1****\2#')
          echo "Connection (maskiert): $masked"
          # Benutzername separat herausziehen (zur Kontrolle: muss postgres.<projektref> sein)
          user=$(printf '%s' "$SUPABASE_DB_URL" | sed -E 's#^[a-z]+://([^:]+):.*#\1#')
          host=$(printf '%s' "$SUPABASE_DB_URL" | sed -E 's#.*@([^:/]+).*#\1#')
          echo "Benutzername: $user"
          echo "Host:         $host"
          case "$user" in
            postgres.*) echo "✅ Benutzername hat das erwartete Format (postgres.<ref>).";;
            *) echo "⚠️  Benutzername ist NICHT 'postgres.<ref>' – beim Session-Pooler muss die Projekt-ID dranhängen!";;
          esac

      - name: Apply migrations
        run: |
          set -e
          shopt -s nullglob
          files=(supabase/migrations/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Keine Migrationsdateien gefunden."; exit 0
          fi
          for f in "${files[@]}"; do
            echo "▶ Wende an: $f"
            psql "$SUPABASE_DB_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          echo "✅ Alle Migrationen angewendet."
