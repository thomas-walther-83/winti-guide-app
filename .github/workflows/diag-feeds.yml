name: Diagnose Feeds (temporär)

# Einmaliges Hilfswerkzeug: prüft iCal-Feeds und opendata.swiss-Datensätze.
# Nur manuell, schreibt nichts in die DB. Wird nach Auswertung entfernt.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python3 winti_diag_feeds.py
